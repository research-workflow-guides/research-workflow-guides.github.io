<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recent Updates | Research Workflow Guidebook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap site-header-inner">
        <a class="brand" href="../index.html">Research Workflow Guidebook</a>
        <nav class="main-nav" aria-label="Primary">
          <a href="../index.html">Home</a>
          <a href="../section-1/">Section 1</a>
          <a href="../section-2/">Section 2</a>
          <a class="lang-switch" href="../ko/">한국어</a>
        </nav>
      </div>
    </header>
    <main class="content-shell">
      <aside class="page-sidebar">
        <section class="toc-card" aria-labelledby="toc-title">
          <p id="toc-title" class="toc-title">On this page</p>
          <a href="#completed">Completed</a>
          <a href="#in-progress">In Progress</a>
          <a href="#planned">Planned</a>
        </section>
      </aside>
      <article class="doc-content">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../index.html">Home</a>
          <span>/</span>
          <span>Recent Updates</span>
        </nav>
        <section class="doc-hero">
          <h1>Recent Updates</h1>
        </section>

        <section id="completed" class="doc-section">
          <h2 style="font-size:1.5rem; margin-bottom:0.5rem;">Completed</h2>
          <div id="list-completed"></div>
        </section>
        <section id="in-progress" class="doc-section">
          <h2 style="font-size:1.5rem; margin-bottom:0.5rem;">In Progress</h2>
          <div id="list-in-progress"></div>
        </section>
        <section id="planned" class="doc-section">
          <h2 style="font-size:1.5rem; margin-bottom:0.5rem;">Planned</h2>
          <div id="list-planned"></div>
        </section>
      </article>
    </main>
    <footer class="site-footer">
      <div class="wrap footer-inner">
        <p>Research Workflow Guidebook — migrated from Google Sites.</p>
        <a class="text-link" href="../updates/">Recent Updates</a>
      </div>
    </footer>
    <script>
      function formatDate(dateStr) {
        return dateStr.replace(/-/g, '.');
      }

      function renderGrouped(items) {
        const groups = {};
        items.forEach(item => {
          const key = item.date || '__nodate__';
          if (!groups[key]) groups[key] = [];
          groups[key].push(item);
        });
        const sortedKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));
        return sortedKeys.map(date => {
          const entries = groups[date].map(item => {
            const link = item.url ? ` &mdash; <a href="${item.url}">view page</a>` : '';
            return `<li>${item.title}${link}</li>`;
          }).join('');
          const dateLabel = date !== '__nodate__'
            ? `<p class="muted" style="font-size:0.9rem; margin-bottom:0.4rem;">${formatDate(date)}</p>`
            : '';
          return `<div class="info-card">${dateLabel}<ul style="margin:0; padding-left:1.2rem;">${entries}</ul></div>`;
        }).join('');
      }

      function renderCards(items) {
        return items.map(item => `
          <div class="info-card">
            <h3>${item.title}</h3>
            <p>${item.description}</p>
          </div>`).join('');
      }

      fetch('data.json')
        .then(r => r.json())
        .then(data => {
          const completed = data
            .filter(d => d.status === 'completed')
            .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
          const inProgress = data.filter(d => d.status === 'in-progress');
          const planned = data.filter(d => d.status === 'planned');

          document.getElementById('list-completed').innerHTML = renderGrouped(completed);
          document.getElementById('list-in-progress').innerHTML = renderCards(inProgress);
          document.getElementById('list-planned').innerHTML = renderCards(planned);
        });
    </script>
  </body>
</html>
